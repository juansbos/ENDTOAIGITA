# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - testdockerone

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: testdockerone.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_6D9BCED7D3394D1E911DF940C69D1DC3 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_994BA4C216184A76BE31C436C20A97E8 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: testdockerone.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_6D9BCED7D3394D1E911DF940C69D1DC3 }}/testdockerone:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4C3D62DB30594BA09AA2B7B2310F76CA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3413DA50250E419DB2F7167D4F24C1D3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_13FD4819500042A9831FB22468871B19 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'testdockerone'
          slot-name: 'Production'
          images: 'testdockerone.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_6D9BCED7D3394D1E911DF940C69D1DC3 }}/testdockerone:${{ github.sha }}'
          